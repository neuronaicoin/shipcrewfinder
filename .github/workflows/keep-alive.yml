name: Keep Alive

on:
  schedule:
    # Her 10 dakikada bir ping — konteyner uykuya dalmadan uyandırır
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ShipCrewFinder
        run: |
          echo "Pinging site at $(date -u)"
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://shipcrewfinder.com/)
          echo "Homepage status: $status"
          if [ "$status" -ge 500 ]; then
            echo "Site returned server error!"
            exit 1
          fi
